<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Breach Simulation</title>

<style>
body{
    margin:0;
    background:black;
    color:#ff0000;
    font-family:monospace;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    animation:shake 0.15s infinite;
}

@keyframes shake{
    0%{transform:translate(1px,1px);}
    50%{transform:translate(-2px,-2px);}
    100%{transform:translate(1px,-1px);}
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
}

h1{
    font-size:2em;
    text-shadow:0 0 20px red;
}

.status{
    margin-top:10px;
    font-size:18px;
}

.countdown{
    font-size:60px;
    margin-top:20px;
    text-shadow:0 0 25px red;
}

.reveal{
    font-size:2em;
    margin-top:20px;
    opacity:0;
    color:#00ff88;
    transition:opacity 1s ease;
}

.colorBlast{
    position:fixed;
    width:20px;
    height:20px;
    border-radius:50%;
    animation:blast 1s ease-out forwards;
}

.water{
    position:fixed;
    width:10px;
    height:10px;
    border-radius:50%;
    animation:spray 1s linear forwards;
}

@keyframes blast{
    from{transform:scale(0);opacity:1;}
    to{transform:scale(6);opacity:0;}
}

@keyframes spray{
    from{transform:translateX(0) translateY(0);opacity:1;}
    to{transform:translateX(600px) translateY(-200px);opacity:0;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>⚠ SYSTEM BREACH SIMULATION ⚠</h1>
    <div class="status" id="statusText">Initializing secure protocol...</div>
    <div class="countdown" id="countdown">5</div>
    <div class="reveal" id="reveal">
        🎉 YOU ARE JOKER <strong>JOKER</strong> 🎨🔥
    </div>
</div>

<!-- 🔊 YOUR AUDIO FILE -->
<audio id="holiSound" src="phatphrogstudio-phatphrogstudiocom-android-voice-system-hacked-480559.mp3"></audio>

<script>

// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01SECURE";
const fontSize = 16;
const columns = canvas.width/fontSize;
const drops = [];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#ff0000";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        const text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);
        if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
            drops[i]=0;
        drops[i]++;
    }
}
setInterval(draw,33);

// COUNTDOWN
let timeLeft = 5;
let countdownEl = document.getElementById("countdown");
let reveal = document.getElementById("reveal");
let statusText = document.getElementById("statusText");

let interval = setInterval(()=>{

    timeLeft--;
    countdownEl.textContent = timeLeft;

    if(timeLeft === 3){
        statusText.textContent = "Analyzing network traffic...";
    }
    if(timeLeft === 2){
        statusText.textContent = "Securing system firewall...";
    }
    if(timeLeft === 1){
        statusText.textContent = "Finalizing protocol...";
    }

    if(timeLeft <= 0){
        clearInterval(interval);
        showHoli();
    }

},1000);

function showHoli(){
    document.body.style.animation = "none";
    document.body.style.color = "#00ff88";
    reveal.style.opacity = "1";
    launchBlast();
    launchWater();

    // 🔊 PLAY YOUR MP3
    document.getElementById("holiSound").play().catch(() => {
        document.body.addEventListener("click", () => {
            document.getElementById("holiSound").play();
        }, { once: true });
    });
}

function launchBlast(){
    for(let i=0;i<80;i++){
        let splash=document.createElement("div");
        splash.classList.add("colorBlast");
        splash.style.left=Math.random()*100+"vw";
        splash.style.top=Math.random()*100+"vh";
        splash.style.backgroundColor=
        ["red","yellow","blue","green","pink","orange","purple"][Math.floor(Math.random()*7)];
        document.body.appendChild(splash);
        setTimeout(()=>splash.remove(),1000);
    }
}

function launchWater(){
    for(let i=0;i<100;i++){
        let water=document.createElement("div");
        water.classList.add("water");
        water.style.left="10px";
        water.style.bottom="50px";
        water.style.backgroundColor=
        ["cyan","blue","pink","yellow","lime"][Math.floor(Math.random()*5)];
        document.body.appendChild(water);
        setTimeout(()=>water.remove(),1000);
    }
}

</script>

</body>
</html>
