<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Security Scan</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff88;
    font-family:monospace;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

.container{
    position:relative;
    z-index:2;
    text-align:center;
    max-width:600px;
    padding:20px;
    background:rgba(0,0,0,0.8);
    border:1px solid #00ff88;
    border-radius:10px;
    box-shadow:0 0 20px #00ff88;
}

.loading-bar{
    width:100%;
    height:10px;
    background:#222;
    border-radius:5px;
    overflow:hidden;
    margin:20px 0;
}

.progress{
    height:100%;
    width:0%;
    background:#00ff88;
    animation:progressAnim 6s linear forwards;
}

@keyframes progressAnim{
    from{width:0%;}
    to{width:100%;}
}

.alert{
    margin-top:20px;
    opacity:0;
    animation:fadeIn 2s forwards;
    animation-delay:2s;
}

.reveal{
    font-size:1.8em;
    color:#00ff88;
    margin-top:25px;
    opacity:0;
}

.glitch{
    animation:glitchFlash 0.3s 3;
}

@keyframes glitchFlash{
    50%{background:white;color:black;}
}

button{
    margin-top:20px;
    padding:10px 20px;
    background:black;
    color:#00ff88;
    border:1px solid #00ff88;
    cursor:pointer;
}

button:hover{
    background:#00ff88;
    color:black;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>⚠ SYSTEM SECURITY SCAN ⚠</h1>
    <div class="loading-bar"><div class="progress"></div></div>
    <div class="alert">Scanning device... Detecting anomalies...</div>
    <div class="reveal">😂 Relax! This is just a prank!</div>
    <button onclick="resetPrank()">Replay</button>
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
// MATRIX BACKGROUND
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width/fontSize;
const drops = [];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#00ff88";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        const text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);
        if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
            drops[i]=0;
        drops[i]++;
    }
}
setInterval(draw,33);

// SOUND
setTimeout(()=>document.getElementById("beep").play(),2000);

// REVEAL AFTER 6 SECONDS
setTimeout(()=>{
    document.querySelector(".container").classList.add("glitch");
    document.querySelector(".reveal").style.opacity="1";
},6000);

function resetPrank(){
    location.reload();
}
</script>

</body>
</html>
